
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HealthCare.com</title>
    <link
      rel="icon"
      th:href="@{/img/common/favicon.ico}"
      href="../../static/img/common/favicon.ico"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" href="../../static/css/style.css" />
  </head>

  <body>
    <header>
      <a href="#" th:href="@{/}"
        ><img
          class="header-logo"
          th:src="@{/img/common/healthcare.png}"
          src="../../static/img/common/healthcare.png"
        /><strong>HealthCare.com</strong></a
      >
      <a href="#" th:href="@{/logout}"
        ><img th:src="@{/img/common/exit.svg}" src="../../static/img/common/exit.svg" />ログアウト
      </a>
    </header>
    <main>
      <h1 class="page-title">継続記録カレンダー（<span th:text="${yearMonth}">2026-07</span>）</h1>

      <div class="card">
        <div class="card-content">
          <h2>今月の達成率</h2>
          <p class="achievement-rate">
            <span th:text="${progress.monthlyAchievementRate}">0</span>%
          </p>
          <p>運動を実施した日を緑色で表示しています。</p>
          <div class="calendar-grid">
            <div
              class="calendar-day"
              th:each="entry : ${progress.calendar}"
              th:classappend="${entry.value} ? 'achieved' : ''"
              th:text="${entry.key}"
            >
              1
            </div>
          </div>
        </div>
      </div>
      <!-- .card -->

      <div class="card">
        <div class="card-content">
          <p><a href="#" th:href="@{/exercise}">&larr; 今日のToDoに戻る</a></p>
        </div>
      </div>
      <!-- .card -->
    </main>
    <footer>&copy; 20xx HealthCare.com</footer>
  </body>
</html>
