<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>天気予報 - HealthCare.com</title>
    <link
      rel="icon"
      th:href="@{/img/common/favicon.ico}"
      href="../static/img/common/favicon.ico"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      th:href="@{/css/style.css}"
      href="../static/css/style.css"
    />
  </head>
  <body>
    <header>
      <a href="#" th:href="@{/}"
        ><img
          class="header-logo"
          th:src="@{/img/common/healthcare.png}"
          src="../static/img/common/healthcare.png"
        /><strong>HealthCare.com</strong></a
      >
      <a href="#" th:href="@{/logout}"
        ><img
          th:src="@{/img/common/exit.svg}"
          src="../static/img/common/exit.svg"
        />ログアウト
      </a>
    </header>

    <main>
      <h1 class="page-title">天気予報</h1>

      <div class="card">
        <div class="card-content">
          <h3>札幌市の現在の天気</h3>

          <!-- 天気表示部分 -->
          <div
            style="
              display: flex;
              gap: 30px;
              align-items: center;
              margin-top: 15px;
              margin-bottom: 30px;
            "
          >
            <span id="weather-desc" style="font-size: 16px; color: #555"
              >読み込み中...</span
            >
            <span
              id="weather-temp"
              style="font-size: 28px; font-weight: bold; color: #007bff"
              >--°C</span
            >
          </div>

          <!-- 戻るボタン（他のメニューと同じリストスタイルを適用） -->
          <ul>
            <li><a href="#" th:href="@{/}">ダッシュボードに戻る</a></li>
          </ul>
        </div>
      </div>
      <!-- .card -->
    </main>

    <footer>&copy; 20xx HealthCare.com</footer>

    <!-- 天気予報を取得するJavaScript -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const lat = 43.0667;
        const lon = 141.35;

        fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=Asia%2FTokyo`,
        )
          .then((response) => response.json())
          .then((data) => {
            const weather = data.current_weather;
            const code = weather.weathercode;

            let desc = "晴れ";
            if (code >= 1 && code <= 3) desc = "曇り";
            else if (code >= 45 && code <= 48) desc = "霧";
            else if (code >= 51 && code <= 67) desc = "雨";
            else if (code >= 71 && code <= 82) desc = "雪";
            else if (code >= 95) desc = "雷雨";

            document.getElementById("weather-desc").innerText = desc;
            document.getElementById("weather-temp").innerText =
              weather.temperature + "°C";
          })
          .catch((error) => {
            console.error("天気の取得に失敗しました:", error);
            document.getElementById("weather-desc").innerText = "取得エラー";
          });
      });
    </script>
  </body>
</html>
